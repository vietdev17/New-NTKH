<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72">
  <!-- Icon: rounded square background -->
  <rect x="0" y="4" width="64" height="64" rx="14" fill="#8B4513"/>

  <!-- Sofa icon (white) -->
  <!-- Back cushions -->
  <rect x="10" y="16" width="18" height="22" rx="4" fill="white" opacity="0.95"/>
  <rect x="30" y="16" width="18" height="22" rx="4" fill="white" opacity="0.95"/>

  <!-- Seat -->
  <rect x="8" y="36" width="48" height="16" rx="4" fill="white"/>

  <!-- Left armrest -->
  <rect x="6" y="28" width="8" height="24" rx="4" fill="#D4956A"/>
  <!-- Right armrest -->
  <rect x="50" y="28" width="8" height="24" rx="4" fill="#D4956A"/>

  <!-- Legs -->
  <rect x="13" y="52" width="5" height="9" rx="2" fill="#D4956A"/>
  <rect x="46" y="52" width="5" height="9" rx="2" fill="#D4956A"/>

  <!-- Text block -->
  <!-- "NỘI THẤT" -->
  <text
    x="80" y="30"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="700"
    letter-spacing="3"
    fill="#8B4513"
  >NỘI THẤT</text>

  <!-- "Khánh Huyền" -->
  <text
    x="80" y="52"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="700"
    fill="#3D1A08"
  >Khánh Huyền</text>

  <!-- Tagline -->
  <text
    x="81" y="66"
    font-family="Arial, Helvetica, sans-serif"
    font-size="8.5"
    letter-spacing="1.8"
    fill="#A0714F"
  >ĐỒNG XOÀI • BÌNH PHƯỚC</text>
</svg>
